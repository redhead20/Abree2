<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For You ❤️</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1 id="title">Hey princess 💛</h1>
      <p class="sub">A little surprise each day leading up to Thursday.</p>
      <p id="countdown" class="countdown">Loading…</p>
    </header>

    <section class="card">
      <h2>Today’s Surprise</h2>
      <div id="todayBox" class="todayBox">Loading…</div>
    </section>

    <section class="card">
      <h2>All Days</h2>
      <div id="days" class="daysGrid"></div>
    </section>

    <footer class="footer">
      <p>Made with love — Peter</p>
    </footer>
  </main>

  <!-- Easter Egg (hidden, floats on Thursday only) -->
  <div id="eggMsg" class="eggMsg" hidden>
    🐣 I Love You So Very Much Abree 💛
  </div>

  <script src="script.js"></script>
</body>
</html>
